services:
  backend:
    container_name: booking_app

    build:
      context: .
      dockerfile: Dockerfile

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    working_dir: /app/src

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    container_name: booking_db

    image: postgres:17

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: